[package]
name = "satd-events-client"
description = "Async Rust client SDK for the satd.events.v1 streaming consumption API"
version.workspace = true
edition.workspace = true
license.workspace = true
# Inherits the workspace `publish = false` for now (see satd-events-proto and the
# workspace note in the root Cargo.toml); the publish flip is a dedicated PR.
publish.workspace = true
repository.workspace = true

[features]
default = []
# Typed bitcoin helpers + prefix-watch local re-filter (pulls the `bitcoin`
# crate). Wired up in a later PR; declared here so the surface is stable.
bitcoin = ["dep:bitcoin"]

[dependencies]
satd-events-proto = { path = "../satd-events-proto" }
tonic = { workspace = true }
prost = { workspace = true }
tokio = { workspace = true }
tokio-stream = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
bitcoin = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
