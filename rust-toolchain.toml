# Single source of truth for the Rust toolchain pin.
#
# Read by:
#   - rustup (devs running `cargo build` outside Nix)
#   - the Nix flake via `rust-bin.fromRustupToolchainFile ./rust-toolchain.toml`
#
# Tracked manually by (until a follow-up wires them to read this file):
#   - .github/workflows/release.yml  (env.RUST_TOOLCHAIN)
#   - Dockerfile                     (ARG RUST_VERSION)
#
# Bump policy: change here first, then update the two files above to match
# in the same commit.

[toolchain]
channel = "1.93.0"
components = ["rustfmt", "clippy", "rust-src"]
profile = "minimal"
