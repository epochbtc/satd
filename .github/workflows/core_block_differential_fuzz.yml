# Block-acceptance differential fuzz — in-process consensus fuzzer with a live
# Bitcoin Core oracle (fuzz/fuzz_targets/block_differential.rs). libFuzzer mutates blocks,
# satd validates them in-process (coverage-guided, catches panics), and a
# resident bitcoind is the accept/reject oracle.
#
# NOT a PR gate. It is long-running and needs a nightly toolchain + cargo-fuzz
# + Docker, so it runs on a nightly schedule and on demand. A discovered
# divergence fails the job; the offending block is in the run log (printed to
# stderr) and uploaded as an artifact.
#
# Triage: a divergence is a real consensus difference between satd and Core —
# investigate before dismissing. Infra flakes (image pull 5xx, runner OOM):
# rerun. Never weaken the accept/reject assertion in response to a flake.

name: Bitcoin Core block-acceptance fuzz

on:
  workflow_dispatch:
    inputs:
      max_total_time:
        description: "Fuzz duration in seconds"
        required: false
        default: "1800"
  schedule:
    # Nightly 04:00 UTC.
    - cron: '0 4 * * *'

permissions:
  contents: read
  # Allow the failure step to open / comment on a tracking issue.
  issues: write

concurrency:
  group: core-block-differential-fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  block-differential:
    name: block-differential fuzz
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Install Linux build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake libclang-dev libssl-dev pkg-config

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Pre-pull Bitcoin Core image
        run: |
          set -euo pipefail
          for i in 1 2 3; do docker pull lncm/bitcoind:v27.0 && break || sleep $((i * 2)); done

      - name: Run block-differential fuzz
        env:
          MAX_TOTAL_TIME: ${{ github.event.inputs.max_total_time || '1800' }}
        run: bash scripts/fuzz/run-block-differential.sh

      - name: Upload divergence artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: core-block-differential-fuzz-artifacts
          path: fuzz/artifacts/**
          if-no-files-found: ignore
          retention-days: 30

      # File an issue ONLY for a real divergence, never for an infra flake.
      # libFuzzer writes a reproducer (crash-/timeout-/oom-*) under
      # fuzz/artifacts/ if and only if the target actually diverged or hung on
      # a specific block. Infra failures (image-pull 5xx, apt, cargo install,
      # runner OOM, docker) fail the job *before* any reproducer is produced —
      # those get no issue; GitHub's built-in scheduled-failure email is the
      # low-priority backstop for a persistently-red pipeline. Manual
      # workflow_dispatch runs are skipped too: whoever dispatched is watching.
      - name: File issue on a real divergence
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          repros=$(find fuzz/artifacts -type f 2>/dev/null | sort || true)
          if [ -z "$repros" ]; then
            echo "No reproducer under fuzz/artifacts/ — this failure looks like"
            echo "infra/flake, not a divergence. Not filing an issue."
            exit 0
          fi

          echo "Reproducer(s) found — filing/updating a divergence issue:"
          echo "$repros"
          repro_list=$(echo "$repros" | sed 's/^/- `/; s/$/`/')

          # Ensure the dedup label exists (idempotent).
          gh label create fuzz-divergence \
            --color B60205 \
            --description "block-differential fuzz found a satd/Core divergence" \
            2>/dev/null || true

          existing=$(gh issue list --label fuzz-divergence --state open \
            --json number --jq '.[0].number // empty')

          body=$(cat <<EOF
          The **block-differential fuzzer** found a \`satd\` ↔ Bitcoin Core
          accept/reject divergence (or a hang/OOM) on a specific block.

          - Run: $RUN_URL
          - Commit: \`${{ github.sha }}\`
          - Reproducer(s) (also in the \`core-block-differential-fuzz-artifacts\` artifact):

          $repro_list

          The offending block hex is also printed to stderr in the run log.
          This is a confirmed finding, not a flake — investigate before
          closing, and never weaken the accept/reject assertion to make it
          pass. Close this issue once resolved; the next divergence opens a
          fresh one.
          EOF
          )

          if [ -n "$existing" ]; then
            echo "Commenting on existing issue #$existing"
            gh issue comment "$existing" --body "Another divergence on $(date -u +%F): $RUN_URL"
          else
            echo "Opening new tracking issue"
            gh issue create \
              --label fuzz-divergence \
              --title "Fuzz divergence: satd vs Bitcoin Core ($(date -u +%F))" \
              --body "$body"
          fi
