name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

env:
  LIBCLANG_PATH: /home/bk/.local/lib

jobs:

  test:
    name: "Tests"
    runs-on: self-hosted
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93
          components: clippy
          override: true

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build all binaries
        run: cargo build --all --locked

      - name: Run tests
        # Cap test parallelism. The default (one thread per CPU) lets the
        # regtest harness spin up 8+ satd processes simultaneously, each
        # opening RocksDB; on the self-hosted runner that contention has
        # repeatedly tripped the per-test startup watchdog under load.
        # Four parallel workers keeps wall-clock reasonable while leaving
        # the runner enough headroom to bind RPC/P2P listeners promptly.
        env:
          RUST_TEST_THREADS: "4"
        run: cargo test --all --locked --all-targets

      - name: Clean build artifacts
        if: always()
        run: cargo clean

  lint:
    name: "Lint"
    runs-on: self-hosted
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93
          components: clippy
          override: true

      - name: Cache Cargo registry & build artifacts
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Clean build artifacts
        if: always()
        run: cargo clean
