name: CI

# PR-triggered build + test + lint. Runs on GitHub-hosted runners so that
# untrusted fork PRs cannot execute arbitrary code on a maintainer-owned
# self-hosted machine. Tag-cut release builds live in `release.yml` (also
# hosted); reproducible-build verification lives in `nix.yml`.

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel superseded runs on the same PR. Avoids burning hosted-runner
# minutes on stale commits when a contributor pushes rapid fixups.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  test:
    name: "Tests"
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      # Hosted ubuntu-24.04 ships ~30 GB of pre-installed SDKs we don't
      # use (Android, .NET, Haskell, CodeQL). The workspace target/
      # directory plus cargo registry routinely exceed the remaining
      # ~14 GB of free disk and SIGBUS the linker mid-link of debug-mode
      # test binaries. Reclaim ~20 GB before the build.
      - name: Free disk space
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      # rocksdb-sys needs libclang (bindgen headers) and the rocksdb
      # native build wants cmake. Hosted ubuntu-24.04 ships clang +
      # cmake binaries but NOT libclang-dev — install explicitly.
      # libssl-dev is needed by the openssl-sys path in reqwest's
      # native-tls backend.
      - name: Install Linux build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            libclang-dev \
            libssl-dev \
            pkg-config

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93
          components: clippy
          override: true

      # Caches ~/.cargo/{registry,git,bin} AND target/, pruning the
      # fast-changing first-party crate artifacts so the expensive dependency
      # builds (rocksdb-sys + its C++ tree, bindgen, proc-macros) are restored
      # instead of recompiled every run. Keyed automatically on the rustc
      # version + Cargo.lock. Replaces the old registry-only actions/cache@v3,
      # which left target/ uncached — so every run rebuilt rocksdb from scratch
      # (~8 min of an ~9 min job). cache-on-failure keeps the warm cache even
      # when tests fail, so iterating on a red PR doesn't pay the full rebuild
      # each push. SHA-pinned (v2.9.1) for supply-chain hygiene.
      - name: Cache Rust dependencies & target dir
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          # Match the `seed-cache` job's `tests` key so a fresh branch's first
          # run restores master's seeded dependency cache (key = shared-key +
          # rustc + Cargo.lock hash, independent of job/event), not a cold one.
          shared-key: tests

      # Pre-build sat-cli. The satd integration tests reach `sat-cli` by
      # path lookup (`Path::new(CARGO_BIN_EXE_satd).parent().join("sat-cli")`)
      # rather than via the `CARGO_BIN_EXE_*` mechanism, because the
      # binary lives in a sibling crate. `cargo test` only auto-builds
      # bin targets for the same crate as the test, so without this
      # explicit step the path lookup finds nothing and every sat-cli
      # test fails with ENOENT. The narrow `-p sat-cli` build (vs. the
      # old `cargo build --all`) is targeted at the actual dependency
      # and avoids the ~5-7min cost of building every workspace bin.
      - name: Pre-build sat-cli (test fixture)
        run: cargo build -p sat-cli --locked

      - name: Run tests
        # Cap test parallelism. The default (one thread per CPU) lets the
        # regtest harness spin up 8+ satd processes simultaneously, each
        # opening RocksDB; on a 4-vCPU hosted runner that contention has
        # repeatedly tripped the per-test startup watchdog under load.
        # Four parallel workers keeps wall-clock reasonable while leaving
        # the runner enough headroom to bind RPC/P2P listeners promptly.
        #
        # SATD_TEST_TIMEOUT_MULT=2 doubles the regtest harness's startup
        # and inter-node-sync deadlines (see `test_timeout` in regtest.rs).
        # Local dev keeps the 1.0 default; CI absorbs the runner's worst-
        # case load without masking real regressions in per-RPC timeouts.
        #
        # `--all-targets` is intentionally NOT passed here. It would pull
        # in the bench targets (criterion + pprof + inferno across the
        # consensus crate) and example targets, which together more than
        # double the link surface and SIGBUS the linker on the
        # 14 GB hosted-runner SSD. Bench / example compilation is
        # validated by the Lint job's clippy run, which type-checks but
        # doesn't link.
        env:
          RUST_TEST_THREADS: "4"
          SATD_TEST_TIMEOUT_MULT: "2"
          # Disable the 80 GB free-disk pre-flight on the address-index
          # backfill RPC. The threshold is sized for mainnet (~56 GB
          # peak temp CF + headroom); regtest chains here are KB to MB
          # and a hosted runner has ~14 GB free, so the production
          # default rejects every backfill test.
          SATD_BACKFILL_PREFLIGHT_BYTES: "0"
        run: cargo test --all --locked

      - name: Run E2E suite
        # The E2E suite (`tests/e2e.rs`) drives `satd` over real sockets
        # via real clients (sat-cli, reqwest, electrum-client). It owns
        # the boot-and-poll lifecycle per-test and is serialized so the
        # tests don't contend over a single hosted-runner's RPC/P2P
        # ports. SATD_E2E_TIMEOUT_MULT=3 gives more headroom than the
        # unit-test mult of 2 because E2E chains poll loops on top of
        # the harness's own startup wait.
        #
        # `--features e2e` is required: the `[[test]] name = "e2e"`
        # target in `satd/Cargo.toml` declares `required-features =
        # ["e2e"]`, so the binary isn't built (and the suite isn't
        # run) by the preceding `cargo test --all` step. The result:
        # the e2e suite runs exactly once, in this step, with
        # `RUST_TEST_THREADS=1` honoured.
        env:
          RUST_TEST_THREADS: "1"
          SATD_TEST_TIMEOUT_MULT: "2"
          SATD_E2E_TIMEOUT_MULT: "3"
          SATD_BACKFILL_PREFLIGHT_BYTES: "0"
        run: cargo test --test e2e --locked --features e2e

  lint:
    name: "Lint"
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install Linux build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            libclang-dev \
            libssl-dev \
            pkg-config

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93
          components: clippy
          override: true

      # Caches ~/.cargo/{registry,git,bin} AND target/, pruning the
      # fast-changing first-party crate artifacts so the expensive dependency
      # builds (rocksdb-sys + its C++ tree, bindgen, proc-macros) are restored
      # instead of recompiled every run. Keyed automatically on the rustc
      # version + Cargo.lock. Replaces the old registry-only actions/cache@v3,
      # which left target/ uncached — so every run rebuilt rocksdb from scratch
      # (~8 min of an ~9 min job). cache-on-failure keeps the warm cache even
      # when tests fail, so iterating on a red PR doesn't pay the full rebuild
      # each push. SHA-pinned (v2.9.1) for supply-chain hygiene.
      - name: Cache Rust dependencies & target dir
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
          # Match the `seed-cache` job's `lint` key (see the test job). The
          # lint cache is separate from `tests` because clippy compiles a
          # different feature set (`--all-features`).
          shared-key: lint

      - name: Run clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Seed the dependency cache from master so a fresh branch's FIRST CI run is
  # warm instead of paying the full ~8 min rocksdb-and-deps rebuild. The
  # Tests/Lint jobs run only on pull_request, so nothing otherwise populates a
  # master (default-branch) cache for new branches to fall back to. This job
  # runs only on push to master and compiles the SAME surfaces the Tests and
  # Lint jobs compile — so their dependency artifacts land in cache — WITHOUT
  # running the suite (no slow/flaky regtest + e2e execution on master). Each
  # matrix leg uses the same `shared-key` as its consumer job (`tests` / `lint`)
  # so the caches match by key.
  seed-cache:
    name: "Seed build cache (${{ matrix.leg }})"
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    strategy:
      fail-fast: false
      matrix:
        leg: [tests, lint]

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo rm -rf /opt/hostedtoolcache/PyPy
          sudo rm -rf /opt/hostedtoolcache/Ruby
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Install Linux build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            libclang-dev \
            libssl-dev \
            pkg-config

      - name: Set up Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: 1.93
          components: clippy
          override: true

      # rust-cache's default save-if persists only on success, so a failed
      # compile never poisons the seed cache (hence no cache-on-failure here).
      - name: Cache Rust dependencies & target dir
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: ${{ matrix.leg }}

      # Compile (don't run) exactly what the Tests job builds: the workspace
      # test binaries, the sat-cli path fixture, and the e2e target. `--no-run`
      # links the test binaries but executes nothing.
      - name: Warm the tests cache
        if: matrix.leg == 'tests'
        run: |
          set -euo pipefail
          cargo test --all --no-run --locked
          cargo build -p sat-cli --locked
          cargo test --test e2e --no-run --locked --features e2e

      # Match the Lint job: clippy --all-targets --all-features. clippy
      # type-checks without linking (dodging the bench/example link that
      # SIGBUSes a plain --all-targets build on the 14 GB runner), and the
      # dependency .rlibs it builds are shared with the PR Lint run. Warnings
      # are allowed here (no `-D warnings`): the goal is to populate deps, not
      # to gate lints — that gate lives in the Lint job.
      - name: Warm the lint cache
        if: matrix.leg == 'lint'
        run: cargo clippy --all-targets --all-features --locked
