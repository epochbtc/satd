# Compatibility canary CI — drives satd's downstream-facing protocols
# from outside the Rust ecosystem to catch wire-format / protocol
# breaks before they ship. Gated as required-status-checks on PR merge.
#
# These canaries complement the in-tree e2e suite at `satd/tests/e2e.rs`
# (which already drives satd via `electrum-client` and reqwest from the
# same protocols downstream wallets consume). The canaries here go one
# layer further: they exercise the same wire formats from *outside*
# Rust — raw HTTP + `nc` against satd's Esplora and Electrum surfaces
# — catching the failure mode where the in-tree clients incidentally
# tolerate something a stricter consumer wouldn't.
#
# Active jobs: Esplora (HTTP) + Electrum (TCP) wire-shape gates; the
# BDK descriptor-wallet canary (a real third-party wallet doing a full
# gap-limit scan + spend over BOTH surfaces); and the real third-party-
# container canaries NBXplorer and BTCPayServer. The container canaries
# boot the actual downstream images against a satd regtest backend
# (NBXplorer indexes blocks over RPC + P2P; BTCPayServer runs the whole
# merchant stack on top of NBXplorer), so green here is a genuine
# end-to-end downstream-compatibility signal, not just wire-shape parity.
# The BDK canary is the analogous real-consumer gate for the Electrum +
# Esplora surfaces: it exercises the realistic wallet workflow (full_scan,
# coinbase-maturity accounting, broadcast, cross-surface consistency)
# that the wire-shape smoke jobs don't. The Bitcoin Core interop canary
# peers satd with a real bitcoind and checks bidirectional P2P interop
# (handshake, BIP324 v2 transport, block sync + tx relay both ways) —
# the only canary that tests satd against the reference node directly.
#
# Triggers:
#   - pull_request → PR-gating (required status check)
#   - schedule weekly → defence in depth against environmental drift
#   - workflow_dispatch → manual rerun without pushing a commit
#
# Triage policy lives in STABILITY_POLICY.md. The short version:
# canary failure → diagnose. If our regression: fix or revert. If a
# downstream upgrade broke: pin downstream to last-known-good in the
# canary, file a tracking issue. Infrastructure flake (network blip,
# registry 5xx): rerun once. NEVER mark a canary advisory-only as a
# flake response.

name: Canary

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # Skip the canary fleet on PRs that touch only documentation / text:
    # there's no code change that could affect a downstream, so spinning
    # up ~9 container jobs would only burn runner minutes. Anything that
    # touches code still runs the full fleet. NOTE: this is safe only
    # because the canary jobs are NOT required status checks (branch
    # protection requires `Lint` + `Tests`, which live in ci.yml and run
    # on every PR). If the canaries are ever made required checks, this
    # `paths-ignore` must be replaced with a job-level skip gate — a
    # path-skipped *workflow* leaves required checks stuck pending and
    # blocks the PR, whereas a skipped *job* reports success.
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE*'
      - '.gitignore'
  schedule:
    # Mondays 06:00 UTC. Weekly cadence is enough to surface
    # environmental drift between PRs (downstream image tags moving,
    # upstream regression in a pinned dep) without burning quota.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Cancel superseded PR runs — the same posture as ci.yml. Doesn't
# apply to scheduled / dispatched runs (each is its own ref).
concurrency:
  group: canary-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Must exactly match rust-toolchain.toml's `channel`. Bare `1.93`
  # resolves to the latest patch (e.g. `1.93.1`), so dtolnay/rust-
  # toolchain installs that, but the workspace then uses
  # `rust-toolchain.toml`'s pin (`1.93.0`) for the actual compile —
  # any installed components/targets land on the wrong toolchain.
  # Same drift class as the one fixed in release.yml on PR #203.
  RUST_TOOLCHAIN: '1.93.0'

jobs:

  # Shared satd build. Each canary downloads the same release-mode
  # binary, so we pay the ~3-5min RocksDB + jemalloc compile cost
  # once per workflow run, not 3×.
  build:
    name: build satd (release)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        # Hosted ubuntu-24.04 ships ~30 GB of pre-installed SDKs we
        # don't use. Reclaim before the release build mid-links.
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          df -h /

      - name: Install Linux build deps
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang cmake libclang-dev libssl-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-canary-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-canary-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-target-

      - name: Build satd + sat-cli (release)
        run: cargo build --release --locked --bin satd --bin sat-cli

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: satd-canary-binaries
          path: |
            target/release/satd
            target/release/sat-cli
          if-no-files-found: error
          retention-days: 1

  # Esplora canary — raw HTTP + jq against the documented endpoints.
  # Verifies wire-shape parity at the bytes/JSON level, independent
  # of any Rust client library.
  canary-esplora:
    name: canary / Esplora
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run Esplora canary
        run: bash scripts/canary/esplora-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: esplora-canary-logs
          path: /tmp/satd-canary-esplora.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # Electrum protocol canary — line-delimited JSON-RPC over TCP via
  # raw `nc`. Catches wire-format breaks at a level below the Rust
  # `electrum-client` crate (which the in-tree e2e suite already
  # exercises).
  canary-electrum:
    name: canary / Electrum
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install netcat (BSD variant — supports -q)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends netcat-openbsd

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run Electrum canary
        run: bash scripts/canary/electrum-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electrum-canary-logs
          path: /tmp/satd-canary-electrum.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # NBXplorer canary — the first real third-party downstream (not an
  # in-tree library against in-tree code). Boots the real
  # nicolasdorier/nbxplorer container (with a Postgres sidecar) against
  # a satd regtest backend and asserts it handshakes, passes its RPC
  # probe, and fully syncs + indexes 10 mined blocks over P2P. NBXplorer
  # is the indexer underneath BTCPayServer, so green here is the
  # load-bearing signal that the Core-client backend path works.
  #
  # Surfaced (and now guards against regression of) four satd↔Core-client
  # compatibility gaps: JSON-RPC 1.0/1.1 request acceptance, getpeerinfo
  # field completeness (timeoffset/inflight), the per-IP inbound cap vs.
  # loopback, and P2P block announcement on a new tip. See the PR that
  # enabled this job.
  canary-nbxplorer:
    name: canary / NBXplorer
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run NBXplorer canary
        run: bash scripts/canary/nbxplorer-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nbxplorer-canary-logs
          path: /tmp/satd-canary-nbxplorer.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # BTCPayServer canary — the top of the stack. Boots the full
  # satd + NBXplorer + Postgres + BTCPayServer deployment and asserts
  # BTCPay reports healthy and BTC-synchronized against a satd backend
  # (GET /api/v1/health -> {"synchronized": true}). Depends on the same
  # satd compatibility surface the NBXplorer canary guards, plus
  # BTCPay's own boot path; green here is the end-to-end "self-custody
  # merchant stack runs on satd unmodified" signal. Heavier than the
  # other canaries (multi-container, ~2-3 min BTCPay boot), hence the
  # longer timeout.
  canary-btcpay:
    name: canary / BTCPayServer
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run BTCPayServer canary
        run: bash scripts/canary/btcpay-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: btcpay-canary-logs
          path: /tmp/satd-canary-btcpay.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # BDK descriptor-wallet canary — the real-consumer gate for the
  # Electrum + Esplora surfaces. Unlike the curl/nc wire-shape jobs and
  # the container canaries, this one needs the Rust toolchain: it builds
  # a STANDALONE cargo project (scripts/canary/bdk-canary, its own
  # workspace + lockfile, so BDK never enters satd's build) that uses
  # bdk_wallet + bdk_electrum + bdk_esplora to run a full descriptor
  # wallet over BOTH surfaces — gap-limit full_scan, coinbase-maturity
  # accounting, a signed spend broadcast via Esplora and observed over
  # Electrum, and a cross-surface balance-agreement check. This is the
  # path that surfaced (and now guards against regression of) the
  # coinbase `vin` omission (missing txid/vout/prevout) that broke
  # strict typed-client deserialization. See the PR that added this job.
  canary-bdk:
    name: canary / BDK wallet
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-canary-bdk-cargo-${{ hashFiles('scripts/canary/bdk-canary/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-bdk-cargo-

      - name: Cache BDK canary target
        uses: actions/cache@v4
        with:
          path: scripts/canary/bdk-canary/target
          key: ${{ runner.os }}-canary-bdk-target-${{ hashFiles('scripts/canary/bdk-canary/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-canary-bdk-target-

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run BDK descriptor-wallet canary
        run: bash scripts/canary/bdk-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bdk-canary-logs
          path: /tmp/satd-canary-bdk.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # Bitcoin Core P2P interop canary — the only canary that tests satd
  # against the reference implementation itself. Peers satd with a real
  # bitcoind regtest node and verifies bidirectional P2P interop:
  # handshake + identity, BIP324 v2 encrypted transport, block sync in
  # BOTH directions, and tx relay in BOTH directions. Catches consensus/
  # relay/wire drift vs. Core directly (not via a downstream's tolerance).
  #
  # Surfaced (and now guards against regression of) two satd P2P bugs:
  # `getdata MSG_CMPCT_BLOCK` was silently dropped (so satd-mined blocks
  # never reached a Core peer that requested the tip as a compact block),
  # and `sendrawtransaction`-submitted txs were never announced to peers
  # (so RPC broadcasts never propagated). See the PR that added this job.
  canary-core-interop:
    name: canary / Bitcoin Core interop
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run Bitcoin Core interop canary
        run: bash scripts/canary/core-interop-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-interop-canary-logs
          path: /tmp/satd-canary-core.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # LND Neutrino canary — runs a real LND node as a BIP 157/158 light
  # client (Neutrino) backed by satd over P2P. The dominant Lightning
  # light-client backend; it exercises a path nothing else does — satd
  # serving BIP 158 compact block filters + filter headers over P2P
  # (`--peerblockfilters=1` → NODE_COMPACT_FILTERS, getcfilters/
  # getcfheaders/getcfcheckpt). Asserts LND reaches synced_to_chain at
  # satd's tip, then that a single filter-matched funding block is
  # selectively downloaded and credited to LND's wallet.
  canary-lnd-neutrino:
    name: canary / LND Neutrino
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run LND Neutrino canary
        run: bash scripts/canary/lnd-neutrino-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lnd-neutrino-canary-logs
          path: /tmp/satd-canary-lnd.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # Electrum reference-wallet canary — runs the actual Electrum wallet
  # (spesmilo/electrum, the canonical client) headless against satd's
  # Electrum server. Unlike the BDK canary (electrum-client library) and
  # the electrum-smoke wire canary (raw nc), the reference wallet does
  # SPV: it syncs + verifies the header chain and checks merkle proofs
  # for its txs. Asserts Electrum connects + SPV-syncs to satd's tip, then
  # that a funded+matured wallet address yields an SPV-verified confirmed
  # balance. Electrum ships only as an AppImage (bundles its own Python +
  # libsecp256k1), run extracted in a thin Debian container.
  canary-electrum-wallet:
    name: canary / Electrum wallet
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run Electrum reference-wallet canary
        run: bash scripts/canary/electrum-wallet-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: electrum-wallet-canary-logs
          path: /tmp/satd-canary-electrum-wallet.*/satd.log
          if-no-files-found: ignore
          retention-days: 7

  # Core Lightning (CLN) canary — runs a real CLN node (lightningd) with
  # satd as its Bitcoin backend over JSON-RPC (the bcli plugin, no ZMQ).
  # Exercises a strict slice of the RPC surface nothing else covers the
  # same way (getchaininfo, getrawblockbyheight, getutxout, estimatefees,
  # sendrawtransaction). Asserts CLN syncs against satd (getinfo blockheight
  # == tip) and that a funded+matured wallet address shows in listfunds.
  #
  # Surfaced (and now guards against regression of) the Core-amount
  # formatting fix: satd previously emitted BTC amounts in shortest form
  # (0.00001) rather than Core's fixed 8-decimal 0.00001000, which CLN's
  # bcli json_to_bitcoin_amount parser rejected — CLN couldn't even start.
  canary-cln:
    name: canary / Core Lightning
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends jq

      - name: Download satd binaries
        uses: actions/download-artifact@v4
        with:
          name: satd-canary-binaries
          path: target/release/

      - name: Mark binaries executable
        run: chmod +x target/release/satd target/release/sat-cli

      - name: Run Core Lightning canary
        run: bash scripts/canary/cln-smoke.sh

      - name: Upload satd log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cln-canary-logs
          path: /tmp/satd-canary-cln.*/satd.log
          if-no-files-found: ignore
          retention-days: 7
