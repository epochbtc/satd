# Release workflow — runs on hosted runners (NOT the self-hosted runner
# that ci.yml uses). Hosted runners give us free amd64 + arm64 Linux,
# Apple Silicon, and the Docker buildx multi-arch story without having
# to manage QEMU on our own infra. Actions minutes are free for public
# repos, so PR-trigger dry-runs and workflow_dispatch are both enabled.
#
# Triggers:
#   - push tags `v*` → full release flow (build + push + sign + GitHub Release)
#   - pull_request   → build-only dry-run; no push, no sign, no release
#   - workflow_dispatch → same as PR-trigger; useful for one-off matrix
#                         smoke runs after toolchain bumps
#
# musl tarballs build via `cargo zigbuild` on the host (no container).
# zig ships its own libc + headers for the target architecture, so
# the host's toolchain doesn't need a musl-cross-gcc installed — zig
# acts as both C and C++ cross-compiler. This is the cleanest path
# for Rust + a C++ dep like rocksdb-sys: cmake spawns `zig c++ ...`
# via the CC/CXX env vars that cargo-zigbuild wires up, and the
# resulting object files link statically against musl.
#
# Previously this used cross-rs, but the cross-rs musl images ship
# libclang too old for bindgen 0.69+'s `clang_Type_getValueType`
# requirement, and apt-installing a newer libclang inside the image
# led to clang-sys path-discovery failures. Zigbuild sidesteps the
# whole container — bindgen runs on the host with the host's
# libclang-19, and zig handles the cross-target C++ side cleanly.
#
# The supply-chain-gate job below runs cargo-deny against the workspace
# graph as a hard precondition for every release artifact. If a RustSec
# advisory landed during a quiet period between merges, this gate is
# what prevents shipping the affected build (the PR-time deny.yml only
# catches dep-graph-touching PRs). Triage policy lives in deny.toml.

name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Dockerfile'
      - 'satd/**'
      - 'sat-cli/**'
      - 'node/**'
      - 'node-index/**'
      - 'node-filter-index/**'
      - 'esplora-handlers/**'
      - 'electrum-proto/**'
      - 'tls-config/**'
      - 'events/**'
      - 'mcp/**'
      - 'block-analyzer/**'
      - 'consensus/**'
      - 'sat-tui/**'
  workflow_dispatch:

permissions: {}

env:
  RUST_TOOLCHAIN: '1.93'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # Hard supply-chain gate: every release job below `needs:` this. A new
  # RustSec advisory against a dep we ship will fail the gate and abort
  # the release, even if no PR has run deny.yml since the advisory landed.
  supply-chain-gate:
    name: supply-chain gate (cargo-deny)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.4

      - name: cargo deny check
        run: cargo deny --all-features check

  # CycloneDX 1.5 SBOM for the two shipped binaries (satd, sat-cli).
  # Generated once from Cargo.lock — the dep graph is identical across
  # release targets, so a single SBOM covers all tarballs.
  sbom:
    name: SBOM (CycloneDX)
    needs: [supply-chain-gate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version string
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(git rev-parse --short=12 HEAD)
            echo "version=0.0.0-dev+${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install cargo-cyclonedx
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-cyclonedx@0.5.9

      - name: Generate SBOMs
        run: |
          set -euo pipefail
          # cargo-cyclonedx writes one .cdx.json per workspace member into
          # that member's directory. We want the binaries' SBOMs only —
          # collect satd.cdx.json + sat-cli.cdx.json, version-suffix the
          # filenames, drop the rest.
          #
          # CycloneDX 1.5 is the current widely-tooled spec version. 1.6
          # is the latest but adds only minor enrichment (e.g. licensing
          # disjunctions); pinning 1.5 maximizes consumer compatibility
          # for downstream packagers (Start9, Umbrel, distro tooling).
          cargo cyclonedx --format json --spec-version 1.5 --all-features
          mkdir sbom
          v="${{ steps.version.outputs.version }}"
          cp satd/satd.cdx.json       "sbom/satd-v${v}.cdx.json"
          cp sat-cli/sat-cli.cdx.json "sbom/sat-cli-v${v}.cdx.json"
          cd sbom
          for f in *.cdx.json; do
            sha256sum "$f" > "${f}.sha256"
          done
          ls -la

      # Defensive sanity gate before upload: confirm the SBOMs are
      # parseable JSON and carry a non-empty components list. Catches a
      # cargo-cyclonedx upgrade that silently changes output shape, or a
      # zero-byte file from an upstream tool failure that didn't trip a
      # non-zero exit code. Cheap (jq is preinstalled on hosted runners)
      # and avoids shipping a corrupt artifact in a release.
      - name: Verify SBOM well-formedness
        run: |
          set -euo pipefail
          v="${{ steps.version.outputs.version }}"
          for f in sbom/satd-v${v}.cdx.json sbom/sat-cli-v${v}.cdx.json; do
            jq empty "$f"
            n=$(jq '.components | length' "$f")
            if [[ "$n" -lt 10 ]]; then
              echo "SBOM $f has only $n components — refusing to ship" >&2
              exit 1
            fi
            echo "ok: $f ($n components)"
          done

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: satd-sbom
          path: |
            sbom/*.cdx.json
            sbom/*.cdx.json.sha256
          if-no-files-found: error
          retention-days: 14

  build-tarball:
    name: tarball / ${{ matrix.target }}
    needs: [supply-chain-gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # macos-13 (Intel) is intentionally not in the matrix — Apple
          # Silicon is the targeted macOS surface for satd; a downstream
          # packager who needs an x86_64 darwin build can cross-build
          # from an arm64 darwin host.
          - target: aarch64-apple-darwin
            os: macos-14
          # musl: built via cargo-zigbuild on the amd64 Linux host —
          # no container, no musl-cross-gcc on the runner. zig brings
          # its own libc + cross-compiler for both x86_64 and aarch64
          # musl targets, and rocksdb-sys's cmake build picks it up
          # via CC/CXX env vars that cargo-zigbuild sets. See the
          # file-header comment for the rationale on the cross-rs
          # switch.
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # rocksdb-sys needs libclang (bindgen headers) and the rocksdb
      # native build wants cmake. Hosted ubuntu-24.04 ships clang +
      # cmake binaries but NOT libclang-dev — install explicitly.
      #
      # Applies to musl builds too: cargo-zigbuild runs on the host,
      # and bindgen (a build-script-time tool) needs libclang from
      # the host regardless of which target it's generating bindings
      # for. zig only owns the cross-target C/C++ side.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            libclang-dev \
            pkg-config

      # macOS: librocksdb-sys's build-script binary is linked against
      # libclang.dylib at @rpath. dyld's search list includes
      # /usr/local/lib, but no libclang ships there. Symlink Xcode's
      # libclang.dylib into /usr/local/lib so the dyld lookup succeeds.
      # LIBCLANG_PATH alone (a bindgen-only env var) does not help —
      # this is a dynamic-loader path issue, not a bindgen one.
      - name: Stage libclang for rocksdb-sys (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          xcode_dir="$(xcode-select -p)"
          libclang_dir="${xcode_dir}/Toolchains/XcodeDefault.xctoolchain/usr/lib"
          test -f "${libclang_dir}/libclang.dylib"
          sudo mkdir -p /usr/local/lib
          sudo ln -sf "${libclang_dir}/libclang.dylib" /usr/local/lib/libclang.dylib
          # LIBCLANG_PATH is the bindgen-side hint; harmless to also set.
          echo "LIBCLANG_PATH=${libclang_dir}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      # Zig + cargo-zigbuild for musl cross-compilation. The
      # `ziglang` PyPI wheel bundles a working zig binary (no
      # third-party action needed) and cargo-zigbuild auto-discovers
      # it on PATH. Pin both: cargo-zigbuild's zig-version detection
      # is tightly coupled to the language's API, and an unpinned
      # upgrade can break overnight.
      - name: Install Python (for cargo-zigbuild + ziglang wheel)
        if: matrix.use_zigbuild == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cargo-zigbuild + zig
        if: matrix.use_zigbuild == true
        run: |
          set -euo pipefail
          pip install --no-cache-dir 'cargo-zigbuild==0.20.1' 'ziglang==0.13.0'
          # Sanity: confirm both binaries are on PATH and report versions.
          cargo zigbuild --version
          python -m ziglang version

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-target-

      - name: Build release binaries (cargo)
        if: matrix.use_zigbuild != true
        run: |
          cargo build --release --locked \
            --bin satd --bin sat-cli \
            --target ${{ matrix.target }}

      - name: Build release binaries (zigbuild)
        if: matrix.use_zigbuild == true
        env:
          # bindgen runs on the host (build-script time, not target
          # time), so it needs the host's libclang — Ubuntu 24.04
          # ships libclang-19 here.
          LIBCLANG_PATH: /usr/lib/llvm-19/lib
        run: |
          cargo zigbuild --release --locked \
            --bin satd --bin sat-cli \
            --target ${{ matrix.target }}

      - name: Determine version string
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(git rev-parse --short=12 HEAD)
            echo "version=0.0.0-dev+${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage tarball contents
        shell: bash
        run: |
          set -euo pipefail
          stage="satd-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage/bin"
          cp "target/${{ matrix.target }}/release/satd"    "$stage/bin/satd"
          cp "target/${{ matrix.target }}/release/sat-cli" "$stage/bin/sat-cli"
          # Strip is best-effort: macOS strip on cross-compiled aarch64
          # binaries from a macos-13 runner can fail on signature
          # checks. Don't gate the release on it.
          strip "$stage/bin/satd"    || true
          strip "$stage/bin/sat-cli" || true
          cp README.md           "$stage/README.md"
          cp docs/PACKAGING.md   "$stage/PACKAGING.md"
          cp CORE_DIFFERENCES.md "$stage/CORE_DIFFERENCES.md"
          cp STABILITY_POLICY.md "$stage/STABILITY_POLICY.md"
          if [[ -f LICENSE ]]; then
            cp LICENSE "$stage/LICENSE"
          fi
          # Manifest pinning the build provenance for offline auditors
          # who only have the tarball. Augmented by minisig/cosign in PR-3.
          {
            echo "name: satd"
            echo "version: ${{ steps.version.outputs.version }}"
            echo "target: ${{ matrix.target }}"
            echo "commit: ${GITHUB_SHA}"
            echo "ref: ${GITHUB_REF}"
            echo "rust: ${{ env.RUST_TOOLCHAIN }}"
            echo "built-at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner: ${{ runner.os }}-${{ runner.arch }}"
          } > "$stage/MANIFEST"
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Pack tarball
        shell: bash
        run: |
          set -euo pipefail
          # zstd is the default modern tarball compressor — better
          # ratio than gzip and an order of magnitude faster decompress.
          # PACKAGING.md commits to .tar.zst as the artifact format.
          #
          # macOS ships BSD tar as `tar`; the reproducible-friendly
          # flags (--owner, --mtime, --sort) are GNU-only. Both
          # macos-13 + macos-14 hosted runners include gnu-tar via
          # Homebrew under the name `gtar`. Pick whichever exists.
          if command -v gtar >/dev/null 2>&1; then
            TAR=gtar
          else
            TAR=tar
          fi
          "$TAR" --owner=0 --group=0 --numeric-owner \
                 --format=ustar \
                 --sort=name \
                 --mtime='2026-01-01 00:00:00 UTC' \
                 -cf "${STAGE}.tar" "${STAGE}"
          zstd -19 --rm "${STAGE}.tar"
          # `sha256sum` is GNU coreutils; macOS ships `shasum -a 256`.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${STAGE}.tar.zst" > "${STAGE}.tar.zst.sha256"
          else
            shasum -a 256 "${STAGE}.tar.zst" > "${STAGE}.tar.zst.sha256"
          fi

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}.tar.zst
          path: |
            ${{ env.STAGE }}.tar.zst
            ${{ env.STAGE }}.tar.zst.sha256
          if-no-files-found: error
          retention-days: 14


  # Per-platform Docker build on a native runner. QEMU emulation of
  # arm64 on amd64 (the previous design) takes 2+ hours cold for this
  # workspace because rocksdb's C++ build is huge. With native runners
  # each platform compiles in 5-15 min. The merge job below stitches
  # the per-arch images into a single multi-arch manifest.
  build-docker-platform:
    name: docker / ${{ matrix.platform }}
    needs: [supply-chain-gate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            os: ubuntu-24.04
            slug: amd64
          - platform: linux/arm64
            os: ubuntu-24.04-arm
            slug: arm64

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # `bake-target=metadata` is irrelevant here; we just want the
          # OCI labels. The merge job below pulls the actual tags from
          # its own metadata-action invocation — per-platform images
          # are referenced only by digest.
          labels: |
            org.opencontainers.image.title=satd
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR / dispatch — no push)
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.slug }}
          # provenance=false skips buildkit's auto-generated SLSA
          # attestation. We do our own provenance via cosign keyless
          # in merge-docker (the Sigstore cert ties the image to a
          # specific workflow run + ref), and a real SBOM ships in
          # the SBOM job (above) attaches the dep manifest separately. The auto-attestation here would produce a partial
          # provenance record that's neither verifiable end-to-end
          # nor consistent with the cosign signature, which is worse
          # than no record. Re-enable would require reconciling against the cosign signature path.
          provenance: false

      - name: Build and push by digest (tag)
        if: startsWith(github.ref, 'refs/tags/')
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # push-by-digest avoids racing the manifest list with the
          # other arch — each per-arch build pushes to GHCR by digest
          # only (no tag), and the merge job creates the tagged
          # manifest list referencing both digests.
          outputs: |
            type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=${{ matrix.slug }}
          # provenance=false skips buildkit's auto-generated SLSA
          # attestation. We do our own provenance via cosign keyless
          # in merge-docker (the Sigstore cert ties the image to a
          # specific workflow run + ref), and a real SBOM ships in
          # the SBOM job (above) attaches the dep manifest separately. The auto-attestation here would produce a partial
          # provenance record that's neither verifiable end-to-end
          # nor consistent with the cosign signature, which is worse
          # than no record. Re-enable would require reconciling against the cosign signature path.
          provenance: false

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p /tmp/digests
          digest='${{ steps.build.outputs.digest }}'
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1


  merge-docker:
    name: docker / merge manifest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-docker-platform]
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      # cosign keyless OIDC needs an id-token to mint a short-lived
      # signing certificate. Without this permission the sign step
      # fails with "missing OIDC token".
      id-token: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute manifest tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Pre-release tags (anything with `-`, e.g. v0.1.0-rc1) get
          # only the full {{version}} tag — they MUST NOT advance the
          # `latest` or {{major}}.{{minor}} aliases. Otherwise an rc
          # build would briefly own `latest` and an operator running
          # `docker pull …:latest` would silently pick up an unstable
          # release.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Create + push manifest list
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          tags=$(jq -cr '.tags | map("--tag " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}')
          digests=$(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
          docker buildx imagetools create $tags $digests

      - name: Inspect manifest
        id: inspect
        run: |
          set -euo pipefail
          tag=$(jq -cr '.tags[0]' <<< '${{ steps.meta.outputs.json }}')
          docker buildx imagetools inspect "$tag"
          # Resolve the manifest-list digest so we can sign by digest
          # rather than by tag — signing the digest is durable across
          # any future tag re-pointing.
          digest=$(docker buildx imagetools inspect "$tag" \
                     --format '{{json .Manifest}}' | jq -r '.digest')
          echo "manifest_digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      # Keyless OIDC signing. The signing certificate's identity binds
      # to this exact workflow file at this exact tag ref; verifiers
      # use the same identity binding (see SECURITY.md). No long-lived
      # signing key, no key rotation. Attestation lands in Rekor.
      - name: Sign manifest list (cosign keyless)
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          ref="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.inspect.outputs.manifest_digest }}"
          echo ">> Signing $ref"
          cosign sign "$ref"


  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-tarball, merge-docker, sbom]
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog reference)
        uses: actions/checkout@v4

      - name: Download tarball artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Filter out the per-arch digest artifacts (only the
          # merge-docker job needs them) and the auto-uploaded
          # `*.dockerbuild` build-record artifact that
          # docker/build-push-action@v6 attaches by default. Both
          # were being pulled here previously, which (a) wasted
          # bandwidth and (b) bit us on v0.1.0-rc1 when an Azure
          # blob fetch on the dockerbuild artifact transient-failed
          # 5 retries in a row, killing the entire release step
          # despite every tarball having downloaded fine.
          pattern: 'satd-*'
          merge-multiple: true

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: satd-sbom
          path: dist

      - name: Aggregate sha256sums
        run: |
          set -euo pipefail
          cd dist
          ls -la
          # Per-tarball + per-SBOM .sha256 files were uploaded; concatenate
          # into one canonical SHA256SUMS file for the release.
          cat *.tar.zst.sha256 *.cdx.json.sha256 | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate from PR titles; we'll replace this with a
          # CHANGELOG.md-driven body once the public-release machinery
          # for that lands.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.zst
            dist/*.tar.zst.sha256
            dist/*.cdx.json
            dist/*.cdx.json.sha256
            dist/SHA256SUMS
