# Release workflow — runs on hosted runners (NOT the self-hosted runner
# that ci.yml uses). Hosted runners give us free amd64 + arm64 Linux,
# Intel + Apple Silicon macOS, and the Docker buildx multi-arch story
# without having to manage QEMU on our own infra.
#
# Triggers:
#   - push of a `v*` tag → full publish (tarballs uploaded to a GitHub
#     Release; multi-arch image pushed to ghcr.io/epochbtc/satd).
#   - pull_request touching this workflow, the Dockerfile, or
#     Cargo.lock/Cargo.toml → dry-run build of every artifact, no
#     publish. This is what catches workflow / Dockerfile breakage
#     before a tag goes out.
#   - workflow_dispatch → manual run, also dry-run by default.
#
# What's intentionally NOT here yet (other PRs in the packaging stack):
#   - musl tarball targets (PR-2 follow-on; rocksdb-sys + musl wants a
#     dedicated cross toolchain and the priority for v0.1.0 is gnu-linux
#     + macOS, both of which package managers handle natively)
#   - minisign tarball signing + cosign keyless image signing → PR-3
#   - Reproducible-build bit-for-bit verification → PR-4 (Nix flake)
#   - SBOM generation + cargo-deny gate → PR-5

name: Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [master]
    paths:
      - 'Dockerfile'
      - '.github/workflows/release.yml'
      - 'Cargo.lock'
      - 'Cargo.toml'
  workflow_dispatch:

permissions: {}

env:
  RUST_TOOLCHAIN: '1.93'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  build-tarball:
    name: tarball / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux runners need clang/libclang for rocksdb-sys bindgen and
      # cmake for the rocksdb native code. Pre-installed on
      # ubuntu-24.04 + ubuntu-24.04-arm; this step is a sanity check
      # that makes the dependency explicit so a future runner image
      # change can't silently break the build.
      - name: Verify Linux build deps
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          for tool in clang cmake pkg-config; do
            command -v "$tool" >/dev/null || { echo "missing: $tool"; exit 1; }
          done
          dpkg -s libclang-dev >/dev/null
          dpkg -s libssl-dev >/dev/null

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-target-

      - name: Build release binaries
        run: |
          cargo build --release --locked \
            --bin satd --bin sat-cli \
            --target ${{ matrix.target }}

      - name: Determine version string
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            short_sha=$(git rev-parse --short=12 HEAD)
            echo "version=0.0.0-dev+${short_sha}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage tarball contents
        shell: bash
        run: |
          set -euo pipefail
          stage="satd-${{ steps.version.outputs.version }}-${{ matrix.target }}"
          mkdir -p "$stage/bin"
          cp "target/${{ matrix.target }}/release/satd"    "$stage/bin/satd"
          cp "target/${{ matrix.target }}/release/sat-cli" "$stage/bin/sat-cli"
          # Strip is best-effort: macOS strip on cross-compiled aarch64
          # binaries from a macos-13 runner can fail on signature
          # checks. Don't gate the release on it.
          strip "$stage/bin/satd"    || true
          strip "$stage/bin/sat-cli" || true
          cp README.md           "$stage/README.md"
          cp docs/PACKAGING.md   "$stage/PACKAGING.md"
          cp CORE_DIFFERENCES.md "$stage/CORE_DIFFERENCES.md"
          cp STABILITY_POLICY.md "$stage/STABILITY_POLICY.md"
          if [[ -f LICENSE ]]; then
            cp LICENSE "$stage/LICENSE"
          fi
          # Manifest pinning the build provenance for offline auditors
          # who only have the tarball. Augmented by minisig/cosign in PR-3.
          {
            echo "name: satd"
            echo "version: ${{ steps.version.outputs.version }}"
            echo "target: ${{ matrix.target }}"
            echo "commit: ${GITHUB_SHA}"
            echo "ref: ${GITHUB_REF}"
            echo "rust: ${{ env.RUST_TOOLCHAIN }}"
            echo "built-at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner: ${{ runner.os }}-${{ runner.arch }}"
          } > "$stage/MANIFEST"
          echo "STAGE=$stage" >> "$GITHUB_ENV"

      - name: Pack tarball
        shell: bash
        run: |
          set -euo pipefail
          # zstd is the default modern tarball compressor — better
          # ratio than gzip and an order of magnitude faster decompress.
          # PACKAGING.md commits to .tar.zst as the artifact format.
          tar --owner=0 --group=0 --numeric-owner \
              --format=ustar \
              --sort=name \
              --mtime='2026-01-01 00:00:00 UTC' \
              -cf "${STAGE}.tar" "${STAGE}"
          zstd -19 --rm "${STAGE}.tar"
          sha256sum "${STAGE}.tar.zst" > "${STAGE}.tar.zst.sha256"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.STAGE }}.tar.zst
          path: |
            ${{ env.STAGE }}.tar.zst
            ${{ env.STAGE }}.tar.zst.sha256
          if-no-files-found: error
          retention-days: 14


  build-docker:
    name: docker / multi-arch
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the amd64 runner cross-build linux/arm64 layers in the
      # same job. Slow (~25-40 min cold for arm64), but simple. Once we
      # have native ARM Linux runners wired into a matrix-and-merge job,
      # this becomes ~10 min. Tracked for a follow-up.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      # Authentication for GHCR. On a PR we still want to exercise the
      # build, just not the push — so the login step itself is gated
      # on tag-trigger to keep it skippable for forks (no token).
      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.title=satd
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=TBD

      - name: Build and (conditionally) push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false


  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-tarball, build-docker]
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
      - name: Checkout (for changelog reference)
        uses: actions/checkout@v4

      - name: Download tarball artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate sha256sums
        run: |
          set -euo pipefail
          cd dist
          ls -la
          # Per-tarball .sha256 files were uploaded; concatenate into one.
          cat *.tar.zst.sha256 | sort > SHA256SUMS
          cat SHA256SUMS

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate from PR titles; we'll replace this with a
          # CHANGELOG.md-driven body once the public-release machinery
          # for that lands.
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.zst
            dist/*.tar.zst.sha256
            dist/SHA256SUMS
