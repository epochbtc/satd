[workspace]
members = ["satd", "sat-cli", "node", "node-index", "esplora-handlers", "sat-tui", "mcp", "consensus", "events"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"

[workspace.dependencies]
bitcoin = { version = "0.32", features = ["serde", "rand-std"] }
jsonrpsee = { version = "0.26", features = ["server", "http-client", "macros"] }
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = "0.8"
base64 = "0.22"
tower = "0.5"
tower-http = "0.6"
hyper = "1"
thiserror = "2"
reqwest = { version = "0.12", features = ["json"] }
rocksdb = { version = "0.24", default-features = false, features = ["zstd", "lz4"] }
hex = "0.4"
bincode = "1"
bitcoinconsensus = "0.106"
rayon = "1.10"
tokio-socks = "0.5"
lru = "0.12"
crossbeam-channel = "0.5"
async-trait = "0.1"
uuid = { version = "1", features = ["v4"] }
tonic = "0.12"
tonic-build = "0.12"
prost = "0.13"
prost-types = "0.13"
protoc-bin-vendored = "3"
tokio-stream = "0.1"
zeromq = { version = "0.4", default-features = false, features = ["tokio-runtime", "all-transport"] }
ratatui = { version = "0.29", features = ["crossterm"] }
crossterm = "0.28"
rmcp = { version = "1", features = ["server", "transport-io", "transport-streamable-http-server"] }
schemars = { version = "0.8", features = ["derive"] }
