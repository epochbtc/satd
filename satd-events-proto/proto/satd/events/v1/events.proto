syntax = "proto3";

package satd.events.v1;

service NodeEventStream {
  // Server-streaming firehose: the client opens one Subscribe call and
  // receives NodeEvent messages (category-filtered, optional durable
  // replay via from_cursor) until it disconnects. No client→server
  // messages on the stream.
  rpc Subscribe(SubscribeRequest) returns (stream NodeEvent);

  // Bidirectional watch stream: the client manages a live watch-set
  // (outpoints + scripts) via SubscribeControl messages and receives
  // OutpointSpent / ScriptMatched events the moment a watched outpoint is
  // spent or a watched script is paid (mempool + confirmed), interleaved
  // with the live category-filtered firehose. Each watch addition is
  // gated by the stream:watch capability and the per-token watch quota.
  rpc Watch(stream SubscribeControl) returns (stream NodeEvent);
}

// Client→server control on the bidirectional Watch stream. A tagged union
// so new watch kinds slot in without a protocol break.
message SubscribeControl {
  oneof msg {
    // Mid-stream re-anchor. Replays confirmed history forward from this
    // cursor (snapshot→live handoff, same as Subscribe.from_cursor) and then
    // resumes the live firehose, without tearing down the watch-set (its
    // quota leases are held across the re-anchor). Replayed confirmed events
    // are emitted in height order ahead of the resumed live tail; the client
    // de-duplicates the overlap by (height, hash). Historical watch *matches*
    // are not replayed — the client reconstructs them from the replayed
    // blocks against its own watch-set. Rate-limited per principal; at most
    // one re-anchor is in flight at a time — a SetCursor arriving while one is
    // queued or actively draining is rejected with SetCursorResult{
    // CursorRejected{CONCURRENT_REANCHOR}}, never silently dropped.
    SetCursor       set_cursor       = 1;
    // Adjust the live firehose category bitfield (mempool=1, chain=2,
    // heartbeat=4; 0 = all). Applies immediately.
    SetCategories   set_categories   = 2;
    // Add scripthashes (each 32 bytes, sha256(scriptPubKey)) to the
    // watch-set. Charges N watch-quota units for N scripthashes.
    AddScripts      add_scripts      = 3;
    // Remove scripthashes from the watch-set.
    RemoveScripts   remove_scripts   = 4;
    // Add outpoints to the watch-set. Charges N units for N outpoints.
    AddOutpoints    add_outpoints    = 5;
    // Remove outpoints from the watch-set.
    RemoveOutpoints remove_outpoints = 6;
    // Expand a descriptor into a script watch-set (rust-miniscript). The
    // server derives the window [start, start+gap_limit), watches it, and
    // RETAINS the descriptor → derived-scripthashes membership so the window
    // can be slid or removed cleanly; charges one unit per net-new derived
    // script. The CLIENT owns gap-limit tracking: as funding nears the
    // window's high end, it re-sends AddDescriptor with an advanced `start`.
    // Re-asserting the same descriptor string with a slid window reconciles
    // server-side — scripts that left the window are released (if no other
    // watch still holds them), scripts that entered are added — so the client
    // no longer has to Remove* the trailing scripts by hand.
    AddDescriptor   add_descriptor   = 7;
    // Remove a descriptor previously added with AddDescriptor, releasing every
    // scripthash its window contributed whose last owner this drops. A
    // scripthash the descriptor shares with a direct AddScripts or another
    // descriptor stays watched (its quota unit is held until its final owner
    // goes). `descriptor` must byte-match the string AddDescriptor was sent
    // with. Removing an unknown descriptor is a no-op.
    RemoveDescriptor remove_descriptor = 12;
    // Add transaction ids to the watch-set. Two primitives over one txid index,
    // selected by `min_depths` (see AddTransactions):
    //   * empty min_depths  → a persistent LIFECYCLE watch on each txid: narrates
    //     seen → confirmed → replaced / evicted / unconfirmed. Charges 1 unit/txid.
    //     Optional `auto_close_depth` self-evicts + emits TxidFinalized once buried.
    //   * non-empty min_depths → single-shot DEPTH ALARMS keyed (txid, depth):
    //     TxidDepthReached once the tx is `depth` confirmations deep, then self-evicts.
    //     Charges 1 unit per (txid, depth).
    AddTransactions    add_transactions    = 8;
    // Remove txids from the watch-set. Mirrors AddTransactions: empty min_depths
    // removes the lifecycle watch(es); non-empty removes those depth alarms.
    RemoveTransactions remove_transactions = 9;
    // Privacy-preserving prefix watch (§7.5): watch a k-bit prefix of
    // sha256(scriptPubKey). The server delivers every tx whose output (mempool +
    // confirmed) OR spent prevout (CONFIRMED only — recovered from block undo
    // data) script falls in the 2^-k bucket (PrefixMatched, full raw_tx inline)
    // and the client filters locally, so the server learns only the bucket,
    // never the exact script. Charged by COARSENESS: a coarser bucket
    // (smaller bits) costs more units. `bits` must be within the operator range
    // [streamprefixminbits, streamprefixmaxbits].
    AddScriptPrefixes    add_script_prefixes    = 10;
    // Remove prefix buckets from the watch-set; releases each bucket's units.
    RemoveScriptPrefixes remove_script_prefixes = 11;
    // Atomically REPLACE the entire watch-set with the one carried here — the
    // whole desired set (scripts, outpoints, txids, depth alarms, descriptors,
    // prefixes, category filter) in a single message. The server reconciles it
    // under the watch-set lock, by EFFECTIVE scripthash coverage (descriptors
    // expanded): items in both the old and new set keep their registration and
    // quota lease untouched (no unwatch/rewatch gap, even for a scripthash whose
    // mechanism changes — a direct add becoming descriptor-covered or vice
    // versa), departed items are released, net-new items are charged. Quota is
    // all-or-nothing on the WHOLE target: if the target's total unit cost
    // exceeds the principal's quota the watch-set is left UNCHANGED and the
    // server replies WatchSetResult{WatchSetRejected}. On success it replies
    // WatchSetResult{WatchSetAccepted{added,removed,unchanged}}. This is the
    // primitive an SDK reload/realign uses: one round-trip, gap-free, with a
    // deterministic result — never a client-computed Add*/Remove* delta whose
    // ordering can strand coverage or over-charge at quota.
    SetWatchSet set_watch_set = 13;
  }
}

// A complete watch-set snapshot for SetWatchSet. Each repeated field is the FULL
// desired membership of that kind (not a delta). `min_values` is parallel to
// `scripthashes` (same rule as AddScripts: empty = no floors, else equal length).
// Descriptors are expanded server-side over each window, exactly as AddDescriptor.
message SetWatchSet {
  uint32 categories                   = 1; // firehose filter (0 = all)
  repeated bytes scripthashes         = 2; // direct script watches (32 bytes each)
  repeated uint64 min_values          = 3; // optional per-script floor, parallel to scripthashes
  repeated Outpoint outpoints         = 4;
  repeated AddDescriptor descriptors  = 5; // each expanded over [start, start+gap_limit)
  repeated ScriptPrefix prefixes      = 6;
  repeated WatchLifecycle lifecycles  = 7; // txid lifecycle watches
  repeated WatchDepthAlarm depth_alarms = 8; // single-shot (txid, depth) alarms
}

// One txid lifecycle watch in a SetWatchSet snapshot. `auto_close_depth` matches
// AddTransactions: 0 = persist until removed, >= 1 = self-evict + TxidFinalized
// once that many confirmations deep.
message WatchLifecycle { bytes txid = 1; uint32 auto_close_depth = 2; }
// One single-shot depth alarm in a SetWatchSet snapshot. `depth` >= 1.
message WatchDepthAlarm { bytes txid = 1; uint32 depth = 2; }

message AddDescriptor {
  string descriptor = 1; // rust-miniscript output descriptor (public)
  uint32 gap_limit  = 2; // window size: number of indices to derive/watch
  uint32 start      = 3; // window start index (default 0); enables a client-
                         // managed sliding window [start, start+gap_limit)
}

message RemoveDescriptor {
  string descriptor = 1; // the descriptor string AddDescriptor was sent with
}

message SetCursor      { Cursor cursor = 1; }
message SetCategories  { uint32 categories = 1; }
message Outpoint       { bytes txid = 1; uint32 vout = 2; }
// min_values: optional per-scripthash `min_value` floor (satoshis), parallel to
//   `scripthashes`. Empty = no floors (every match delivered). If non-empty it
//   MUST have the same length as `scripthashes`; index i is the floor for
//   scripthash i. A match is suppressed unless the matched value (output value
//   for funding, spent-prevout value for spending) is >= the floor. Re-asserting
//   a watched scripthash updates its floor.
message AddScripts     { repeated bytes scripthashes = 1; repeated uint64 min_values = 2; }
message RemoveScripts  { repeated bytes scripthashes = 1; }
message AddOutpoints   { repeated Outpoint outpoints = 1; }
message RemoveOutpoints{ repeated Outpoint outpoints = 1; }
// txids: each 32 raw bytes.
// min_depths: empty = lifecycle watch(es); non-empty = one depth alarm per
//   (txid × depth). Each depth >= 1.
// auto_close_depth: 0 = disabled (lifecycle watch persists until removed). >= 1 =
//   the lifecycle watch self-evicts and emits TxidFinalized once the tx is that many
//   confirmations deep. Applies only to lifecycle watches (min_depths empty); ignored
//   when min_depths is non-empty. Free modifier — no extra quota unit.
message AddTransactions    { repeated bytes txids = 1; repeated uint32 min_depths = 2; uint32 auto_close_depth = 3; }
message RemoveTransactions { repeated bytes txids = 1; repeated uint32 min_depths = 2; }

// A k-bit prefix of sha256(scriptPubKey): `prefix` is the top ceil(bits/8)
// bytes (big-endian, low bits beyond `bits` ignored), `bits` the length k.
message ScriptPrefix         { bytes prefix = 1; uint32 bits = 2; }
message AddScriptPrefixes    { repeated ScriptPrefix prefixes = 1; }
message RemoveScriptPrefixes { repeated ScriptPrefix prefixes = 1; }

// A watched outpoint was spent.
message OutpointSpent {
  bytes  outpoint_txid = 1;
  uint32 outpoint_vout = 2;
  bytes  spending_txid = 3;
  uint32 spending_vin  = 4;
  bool   confirmed     = 5; // false = seen in mempool, not yet in a block
}

// A watched script was matched by a transaction, on either side:
// funding (an output pays the script) or spending (an input spends an output
// that paid the script). Both sides are emitted for blocks (the spend side
// recovered from undo data) and the mempool (the spend side recovered from the
// prevout scripthashes the entry retains at admission).
message ScriptMatched {
  bytes  scripthash = 1;
  bytes  txid       = 2;
  bool   is_output  = 3;    // true = funding (output); false = spending (input)
  uint32 index      = 4;    // vout if is_output, else vin
  bool   confirmed  = 5;
}

// A watched transaction id appeared in the mempool or a connected block.
message TxidMatched {
  bytes  txid      = 1;
  bool   confirmed = 2; // false = seen in mempool, not yet in a block
  uint32 height    = 3; // block height when confirmed; 0 in the mempool
}

// --- lifecycle transitions for a watched txid (in addition to TxidMatched) ---

// A watched tx was replaced in the mempool by a conflicting RBF candidate.
message TxidReplaced {
  bytes txid           = 1;
  bytes replacing_txid = 2; // the incoming tx that evicted it
}

// A watched tx left the mempool by policy (not confirmation, not RBF).
message TxidEvicted {
  bytes  txid   = 1;
  string reason = 2; // "full_pool" | "expiry" | "block_conflict" | "policy"
}

// A watched tx's confirming block was rolled back by a reorg (it is back in flight).
message TxidUnconfirmed {
  bytes  txid        = 1;
  uint32 prev_height = 2; // height it had been confirmed at, now disconnected
}

// A depth alarm fired: the watched tx reached the requested confirmation depth.
// Single-shot — the alarm self-evicts after this.
message TxidDepthReached {
  bytes  txid   = 1;
  uint32 depth  = 2; // confirmations actually reached (>= requested min_depth)
  uint32 height = 3; // active-chain height where the tx is confirmed
}

// A lifecycle watch's auto_close_depth was reached: terminal notice, the
// lifecycle watch has self-evicted (its quota unit is released).
message TxidFinalized {
  bytes  txid   = 1;
  uint32 depth  = 2; // confirmations reached (>= auto_close_depth)
  uint32 height = 3; // active-chain height where the tx is confirmed
}

// A spent prevout that matched a script-prefix bucket (spend side of a
// PrefixMatched): the outpoint consumed, the scriptPubKey it paid, and its value.
// `script_pubkey` is set for confirmed spends (from undo) and for mempool spends
// when `streamprevoutmeta = full`; empty otherwise (the client resolves the
// prevout itself). `amount` is set for confirmed spends and for mempool spends
// when `streamprevoutmeta >= amount` (the default); `has_amount` distinguishes a
// genuine 0-value prevout from "value not retained".
message SpentPrevout {
  bytes  outpoint_txid = 1;
  uint32 outpoint_vout = 2;
  bytes  script_pubkey = 3;
  uint64 amount        = 4;
  bool   has_amount    = 5;
}

// A transaction fell inside a watched script-prefix bucket (§7.5). Carries the
// FULL serialized tx so the client filters the bucket against its real scripts
// locally — no precise follow-up fetch that would re-leak the exact interest.
message PrefixMatched {
  ScriptPrefix prefix    = 1; // the registered bucket that fired
  bytes        raw_tx    = 2; // consensus-serialized matching transaction
  bool         confirmed = 3; // false = mempool, true = connected block
  uint32       height    = 4; // block height when confirmed
  // Spend side: the matched prevout(s) for inputs whose prevout script fell in
  // the bucket. Empty for a pure funding (output-side) match.
  repeated SpentPrevout matched_prevouts = 5;
}

// Filter knobs for a subscription. All optional; an unset field means
// "no filter" (the server applies its own defaults).
message SubscribeRequest {
  // Bitfield: mempool=1, chain=2, heartbeat=4. Zero means "all".
  // Unknown bits are silently ignored — the server treats the request
  // as "any of the known categories I recognize that you set"; it does
  // not error on unrecognized bits so a newer client can address an
  // older server without a hard incompatibility during a rolling
  // upgrade.
  uint32 categories = 1;

  // Forward-only filter. The server begins each subscription from the
  // moment the RPC is opened (no replay buffer) and applies this as a
  // ">since_seq" filter on events observed thereafter. Use it to
  // suppress duplicates after a brief reconnect within the broadcast
  // window — NOT to replay history. Events whose seq <= since_seq are
  // dropped before reaching the wire. For durable replay across a
  // restart or a long disconnect, use `from_cursor` instead.
  optional uint64 since_seq = 2;

  // Durable replay anchor. When set, the server first replays confirmed
  // history forward from this cursor (reading the block index — see
  // `Cursor`), then seamlessly joins the live stream with no gap or
  // duplicate at the boundary (snapshot→live handoff). Unlike
  // `since_seq`, this survives a restart: confirmed cursors are
  // `(height, tx_index)` reconstructed from the durable block store, not
  // an in-memory window. If the server has no block source configured,
  // replay is skipped and the subscription is forward-only.
  optional Cursor from_cursor = 3;
}

// Durable resume position. Confirmed-side cursors are `(height,
// tx_index)` — per-transaction, so a client can resume mid-block after a
// disconnect. `mempool_seq` is a best-effort high-water mark for the
// mempool side (advisory; resets on daemon restart). A client persists
// the `cursor` from the last `NodeEvent` it durably processed and
// presents it as `from_cursor` on reconnect.
message Cursor {
  uint32 height      = 1; // block height of the last delivered confirmed item
  uint32 tx_index    = 2; // index within that block of the last delivered tx
  uint64 mempool_seq = 3; // best-effort mempool high-water (advisory)
  // Per-process epoch nonce of the issuing publisher. node_id is stable
  // across restarts, but mempool_seq resets to 0 each daemon start; on a
  // from_cursor resume the server discards mempool_seq when this differs
  // from the live instance (daemon restarted since the cursor was issued).
  // Confirmed (height) replay is instance-independent and unaffected.
  uint64 instance_id = 4;
}

// Per-event identity stamp applied at the publisher's bridge layer.
message EdgeStamp {
  bytes node_id = 1;          // 16 raw bytes (UUIDv4)
  string region = 2;          // up to 8 ASCII bytes; empty = unset
  uint64 edge_seen_at_ns = 3; // monotonic since publisher start
  uint64 edge_wall_ns = 4;    // wall-clock ns since Unix epoch
  uint64 seq = 5;             // monotonic per publisher, starts at 1
}

// Reasons a tx leaves the mempool by policy (eviction).
enum EvictReason {
  EVICT_REASON_UNSPECIFIED = 0;
  EVICT_REASON_FULL_POOL = 1;
  EVICT_REASON_EXPIRY = 2;
  EVICT_REASON_BLOCK_CONFLICT = 3;
  // Evicted from the quarantine class because its byte budget overflowed
  // (fee-rate eviction within the held set). Inert until a policy is loaded.
  EVICT_REASON_POLICY = 4;
}

// Mempool state transitions, mirroring `node::mempool::events::MempoolEvent`.
message MempoolEvent {
  oneof body {
    MempoolEnter enter = 1;
    MempoolLeaveConfirmed leave_confirmed = 2;
    MempoolLeaveEvicted leave_evicted = 3;
    MempoolLeaveReplaced leave_replaced = 4;
  }
}

message MempoolEnter {
  bytes txid = 1;                 // 32 bytes
  uint64 fee = 2;                 // satoshis
  uint64 vsize = 3;               // virtual bytes
  uint64 fee_rate_sat_per_kvb = 4;// fee rate in sat per kilo-vbyte
  uint64 time = 5;                // seconds since Unix epoch
}

message MempoolLeaveConfirmed {
  bytes txid = 1;
  bytes block_hash = 2;
  uint32 height = 3;
}

message MempoolLeaveEvicted {
  bytes txid = 1;
  EvictReason reason = 2;
}

message MempoolLeaveReplaced {
  bytes txid = 1;
  bytes replacing_txid = 2;
}

// Chain-tip transitions, mirroring `node::chain::events::ChainEvent`.
message ChainEvent {
  oneof body {
    BlockConnected block_connected = 1;
    BlockDisconnected block_disconnected = 2;
    Reorg reorg = 3;
  }
}

message BlockConnected {
  bytes hash = 1;
  uint32 height = 2;
}

message BlockDisconnected {
  bytes hash = 1;
  uint32 height = 2;
}

// First-class reorg marker — in-process ground truth (a ZMQ/header
// sidecar can only infer a reorg). Emitted once before the per-block
// disconnect/connect sequence.
message Reorg {
  uint32 from_height = 1; // height of the abandoned tip
  bytes  old_tip = 2;     // hash of the abandoned tip
  uint32 to_height = 3;   // height of the new active tip
  bytes  new_tip = 4;     // hash of the new active tip
}

// Periodic synthetic event for end-to-end latency probes.
message Heartbeat {
  uint64 uptime_ns = 1;
}

// In-band notice that the server dropped events for this subscriber because
// it could not keep up with the broadcast (the slow-consumer "lag"). The
// stream then continues live. `resume_cursor` is the position of the last
// event the server delivered before the gap; a client that needs the dropped
// events reconnects with `SubscribeRequest.from_cursor = resume_cursor` to
// durably replay them, then rejoin live.
message Lagged {
  uint64 dropped_count = 1; // events skipped between the last delivered and now
  Cursor resume_cursor  = 2; // reconnect anchor to recover the gap
}

// In-band, deterministic outcome of a mid-stream re-anchor
// (`SubscribeControl.set_cursor`). Emitted exactly once per actionable
// SetCursor, ahead of any replayed history it admits, so a client can tell
// "the server accepted my cursor and is replaying from it" from "the server
// ignored it and is still emitting from wherever it already was" — without
// the correlation plumbing a control-stream *response* would need. Mirrors
// the `Lagged` in-band-notice pattern.
message SetCursorResult {
  oneof outcome {
    CursorAccepted accepted = 1;
    CursorRejected rejected = 2;
  }
}

// The re-anchor was admitted; confirmed-history replay will follow this event
// (in height order) before the live tail resumes. `clamped` is set when the
// requested cursor was older than the server's replay window
// (`MAX_REPLAY_BLOCKS`): replay still runs, but only from `earliest_replayed`
// — the client must full-resync history below that height itself. When
// `clamped` is false, `earliest_replayed` is `from.height + 1` and the replay
// covers the whole gap.
message CursorAccepted {
  Cursor from              = 1; // the cursor the server anchored to
  bool   clamped           = 2; // true → replay window truncated the lower end
  uint32 earliest_replayed = 3; // first height that will be replayed
}

// The re-anchor was not admitted; the live stream is unchanged (still emitting
// from its prior position). `current_head` is the server's present resume
// position, so a client can decide whether to retry, back off, or escalate to
// a full resnapshot.
message CursorRejected {
  enum Reason {
    REASON_UNSPECIFIED   = 0;
    RATE_LIMITED         = 1; // per-principal re-anchor rate limit exceeded
    CONCURRENT_REANCHOR  = 2; // another re-anchor is already draining
    EMPTY_CURSOR         = 3; // SetCursor carried no cursor
    NO_SOURCE            = 4; // server has no block source to replay from
  }
  Reason reason       = 1;
  Cursor current_head = 2; // server's current resume position
}

// Deterministic outcome of a SetWatchSet, delivered in-band on the event stream
// (same pattern as SetCursorResult): the atomic replace either applied or was
// rejected whole. The client acts on it — adopt the new set on accept, keep the
// old set on reject.
message WatchSetResult {
  oneof outcome {
    WatchSetAccepted accepted = 1;
    WatchSetRejected rejected = 2;
  }
}

// The replace applied atomically. Counts are by EFFECTIVE coverage: `added` =
// items newly watched, `removed` = items released, `unchanged` = items in both
// the old and new set (kept without a re-registration). The live watch-set now
// equals the SetWatchSet snapshot.
message WatchSetAccepted {
  uint32 added     = 1;
  uint32 removed   = 2;
  uint32 unchanged = 3;
}

// The replace was rejected whole; the live watch-set is UNCHANGED (still the
// prior set). `required` is the target's total quota cost, `quota` the
// principal's ceiling — so a client can shed and retry with a smaller set.
message WatchSetRejected {
  enum Reason {
    REASON_UNSPECIFIED = 0;
    QUOTA_EXCEEDED     = 1; // target's total unit cost exceeds the principal quota
  }
  Reason reason  = 1;
  uint64 required = 2; // units the target set needs
  uint64 quota    = 3; // the principal's quota ceiling
}

// Versioned, edge-stamped envelope. The wire-level type the server
// streams to clients.
message NodeEvent {
  uint32 schema_version = 1;
  EdgeStamp stamp = 2;
  // Durable resume position as of this event. Set on confirmed-side
  // bodies (e.g. a connected block); absent on events that do not
  // advance the durable cursor. A client persists this and presents it
  // as `SubscribeRequest.from_cursor` to resume.
  Cursor cursor = 3;
  // Field 15 (descriptor_needs_addresses) was a deprecated gap-limit
  // side-channel no server ever emitted — gap-limit advancement is a client
  // concern. Retired; reserved so the tag is never silently reused for new
  // semantics.
  reserved 15;
  reserved "descriptor_needs_addresses";
  oneof body {
    MempoolEvent mempool = 10;
    ChainEvent chain = 11;
    Heartbeat heartbeat = 12;
    OutpointSpent outpoint_spent = 13; // watch match (Watch stream)
    ScriptMatched script_matched = 14; // watch match (Watch stream)
    Lagged lagged = 16; // in-band slow-consumer lag notice + resume cursor
    TxidMatched txid_matched = 17; // watch match (Watch stream)
    TxidReplaced txid_replaced = 18; // lifecycle: RBF-replaced
    TxidEvicted txid_evicted = 19; // lifecycle: policy eviction
    TxidUnconfirmed txid_unconfirmed = 20; // lifecycle: reorg rolled back confirmation
    TxidDepthReached txid_depth_reached = 21; // depth alarm (single-shot)
    TxidFinalized txid_finalized = 22; // lifecycle auto-close (terminal)
    PrefixMatched prefix_matched = 23; // privacy-preserving prefix watch (§7.5)
    SetCursorResult set_cursor_result = 24; // deterministic re-anchor ack/reject
    WatchSetResult set_watch_set_result = 25; // deterministic atomic-replace ack/reject
  }
}
